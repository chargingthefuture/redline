<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redline</title>

  <!-- Fill the whole screen on phones; let the game manage its own scaling. -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#6e0b12" />

  <!-- Installable / offline app plumbing. -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/favicon.png" type="image/png" />

  <!-- iOS: run full-screen from the home screen and use a real app icon. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Redline" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="game" width="640" height="360"></canvas>

    <!-- On-screen controls for touch devices. Hidden until a touch is seen. -->
    <div id="touch" class="hidden" aria-hidden="true">
      <div class="pad-left">
        <button class="tbtn" data-btn="left" aria-label="Move left">◀</button>
        <button class="tbtn" data-btn="right" aria-label="Move right">▶</button>
      </div>
      <div class="pad-right">
        <button class="tbtn tbtn-down" data-btn="down" aria-label="Crouch and roll">▼</button>
        <button class="tbtn tbtn-jump" data-btn="jump" aria-label="Jump">A</button>
      </div>
    </div>

    <button id="fullscreen" title="Toggle full screen" aria-label="Toggle full screen">⤢</button>
  </div>

  <script src="js/levels.js"></script>
  <script src="js/input.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script>
    // Register the offline service worker. Only works over http(s)/localhost,
    // which is exactly where "add to home screen" offline install happens.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {
          /* offline install just won't be available; the game still runs */
        });
      });
    }
  </script>
</body>
</html>
