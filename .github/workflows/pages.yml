# Publish Redline to GitHub Pages so it can be played (and installed offline) on
# phones, tablets, and Chromebooks. Runs on every push to main, plus a manual
# button. The workflow enables Pages and points it at itself, so you do not have
# to flip any setting by hand.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run replace an in-progress one instead of queueing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Turn Pages on and set its source to "GitHub Actions" from the workflow
      # itself. Without this, a repo whose Pages source was never switched over
      # in Settings leaves every deployment stuck in "queued" until it times out
      # — which is exactly what was failing before.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Package the site (the whole repo is static files)
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
